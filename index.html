<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深渊洞窟</title>
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --cell-bg: #0f3460;
  --cell-fog: #1a1a2e;
  --text: #eee;
  --text-dim: #8892b0;
  --gold: #f0a500;
  --hp: #e94560;
  --mp: #5dade2;
  --atk: #f37121;
  --def: #4e89ae;
  --common: #b0b0b0;
  --rare: #4da6ff;
  --epic: #c471ed;
  --legendary: #ff8c00;
  --btn: #533483;
  --btn-danger: #c0392b;
  --btn-success: #27ae60;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI","PingFang SC",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#app{
  width:100%;
  max-width:500px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Top bar */
.top-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 12px;
  background:var(--panel);
  border-bottom:1px solid #2a2a4a;
}
.top-bar .floor{font-weight:700;font-size:1.1rem;color:var(--gold);}
.top-bar .stats{display:flex;gap:12px;font-size:0.8rem;}
.top-bar .stats span{display:flex;align-items:center;gap:3px;}
.stat-hp{color:var(--hp)}.stat-mp{color:var(--mp)}.stat-gold{color:var(--gold)}

/* Dungeon area */
.dungeon-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:8px;
}
.dungeon-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  gap:3px;
  width:100%;
  max-width:420px;
  aspect-ratio:1;
}
.cell{
  border-radius:4px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
  transition:all 0.15s;
  position:relative;
  border:2px solid transparent;
  background:var(--cell-fog);
  color:#444;
}
.cell.revealed{background:var(--cell-bg);color:#ccc;}
.cell.adjacent{background:#19294d;border-color:#3a3a6a;color:#aaa;}
.cell.adjacent:hover{background:#1e3363;border-color:#5a5a9a;transform:scale(1.04);z-index:1;}
.cell.player{background:#2d5a27;border-color:#5ae85a;color:#fff;font-size:1.4rem;}
.cell.stairs{background:#4a3a0a;border-color:var(--gold);font-size:1.5rem;}
.cell.chest{font-size:1.4rem;}
.cell.monster{font-size:1.4rem;}
.cell.current{box-shadow:0 0 12px rgba(255,255,255,0.3);}

/* Bottom panel */
.bottom-panel{
  background:var(--panel);
  padding:10px 14px;
  border-top:1px solid #2a2a4a;
}
.player-equip{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}
.equip-slot{
  flex:1;
  background:#0a0a1e;
  border-radius:6px;
  padding:6px 8px;
  text-align:center;
  font-size:0.7rem;
  border:1px solid #2a2a4a;
  min-height:44px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.equip-slot .slot-label{color:var(--text-dim);margin-bottom:2px;}
.equip-slot .slot-item{font-weight:600;font-size:0.75rem;}
.equip-slot .slot-item.rarity-rare{color:var(--rare);}
.equip-slot .slot-item.rarity-epic{color:var(--epic);}
.equip-slot .slot-item.rarity-legendary{color:var(--legendary);}

.bottom-btns{
  display:flex;
  gap:8px;
}
.btn{
  flex:1;
  padding:10px 0;
  border:none;
  border-radius:6px;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  color:#fff;
  transition:filter 0.15s;
}
.btn:active{filter:brightness(0.8);}
.btn-town{background:var(--btn);}
.btn-return{background:var(--btn-danger);}
.btn-stairs{background:var(--btn-success);}
.btn:disabled{opacity:0.4;pointer-events:none;}

/* Modals */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}
.modal-box{
  background:var(--panel);
  border-radius:12px;
  padding:20px;
  max-width:380px;
  width:90%;
  max-height:85vh;
  overflow-y:auto;
  border:1px solid #3a3a6a;
}
.modal-box h3{text-align:center;margin-bottom:12px;font-size:1.1rem;}

/* Combat */
.combat-enemy{
  text-align:center;
  margin-bottom:14px;
  padding:12px;
  background:#0a0a1e;
  border-radius:8px;
}
.combat-enemy .enemy-icon{font-size:3rem;display:block;}
.combat-enemy .enemy-name{font-weight:700;margin:4px 0;}
.combat-enemy .enemy-bars{margin-top:6px;}
.enemy-hp-bar{
  height:10px;background:#333;border-radius:5px;overflow:hidden;
}
.enemy-hp-fill{
  height:100%;background:var(--hp);transition:width 0.3s;
}
.combat-info{display:flex;justify-content:space-around;font-size:0.75rem;color:var(--text-dim);margin-top:6px;}
.combat-actions{display:flex;gap:8px;}
.combat-actions .btn{padding:12px;}
.combat-log{
  margin-top:12px;max-height:100px;overflow-y:auto;
  font-size:0.8rem;color:var(--text-dim);line-height:1.6;
}

/* Loot */
.loot-item{
  background:#0a0a1e;border-radius:8px;padding:12px;
  margin-bottom:10px;text-align:center;border:1px solid #2a2a4a;
}
.loot-item.rarity-rare{border-color:var(--rare);}
.loot-item.rarity-epic{border-color:var(--epic);box-shadow:0 0 10px rgba(196,113,237,0.2);}
.loot-item.rarity-legendary{border-color:var(--legendary);box-shadow:0 0 14px rgba(255,140,0,0.3);}
.loot-item .item-icon{font-size:2rem;display:block;}
.loot-item .item-name{font-weight:700;margin:4px 0;}
.loot-item .item-stats{font-size:0.78rem;color:var(--text-dim);}
.loot-item .item-rarity{font-size:0.7rem;text-transform:uppercase;}

/* Town */
.town-section{margin-bottom:14px;}
.town-section h4{margin-bottom:8px;color:var(--text-dim);font-size:0.85rem;}
.item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px;background:#0a0a1e;border-radius:6px;margin-bottom:6px;
  font-size:0.8rem;gap:6px;
}
.item-row .item-info{flex:1;}
.item-row .item-btns{display:flex;gap:6px;}
.item-row .mini-btn{
  padding:4px 10px;border:none;border-radius:4px;
  font-size:0.7rem;font-weight:600;cursor:pointer;color:#fff;
}
.btn-equip{background:var(--btn);}
.btn-sell{background:#555;}
.btn-discard{background:var(--btn-danger);}

.combat-player-info{
  display:flex;justify-content:space-between;
  font-size:0.78rem;padding:8px 12px;
  background:#0a0a1e;border-radius:6px;margin-bottom:12px;
}

/* Responsive */
@media(max-width:380px){
  .dungeon-grid{max-width:340px;gap:2px;}
  .cell{font-size:1rem;border-radius:3px;}
  .cell.player,.cell.stairs,.cell.monster,.cell.chest{font-size:1.1rem;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// 深渊洞窟 - Dungeon Crawler Game
// ═══════════════════════════════════════════

// ── Constants ─────────────────────────────
const GRID = 8;
const RARITIES = ['common','rare','epic','legendary'];
const RARITY_NAMES = {common:'普通',rare:'稀有',epic:'史诗',legendary:'传说'};
const RARITY_COLORS = {common:'#b0b0b0',rare:'#4da6ff',epic:'#c471ed',legendary:'#ff8c00'};
const RARITY_MULT = {common:1,rare:1.5,epic:2.5,legendary:4};
const RARITY_CHANCE = [0.50,0.30,0.15,0.05]; // floor越高, 传说概率越高
const SLOT_NAMES = {weapon:'武器',armor:'护甲',ring:'戒指'};
const SLOT_ICONS = {weapon:'⚔️',armor:'🛡️',ring:'💍'};
const MONSTER_POOL = [
  {name:'史莱姆',icon:'🟢',baseHp:15,baseAtk:3,baseDef:0,gold:3},
  {name:'骷髅兵',icon:'💀',baseHp:25,baseAtk:6,baseDef:2,gold:5},
  {name:'暗影蝙蝠',icon:'🦇',baseHp:20,baseAtk:8,baseDef:1,gold:4},
  {name:'石魔像',icon:'🗿',baseHp:40,baseAtk:4,baseDef:5,gold:7},
  {name:'毒蛇',icon:'🐍',baseHp:18,baseAtk:9,baseDef:0,gold:4},
  {name:'幽灵',icon:'👻',baseHp:22,baseAtk:7,baseDef:3,gold:6},
  {name:'恶魔猎犬',icon:'🐺',baseHp:30,baseAtk:10,baseDef:2,gold:8},
  {name:'暗黑法师',icon:'🧙',baseHp:28,baseAtk:12,baseDef:3,gold:9},
];
const POTION_HEAL = 0.35;

// ── Game State ────────────────────────────
let G = {};

function initGame() {
  G = {
    floor: 1,
    player: {
      hp:100, maxHp:100, mp:50, maxMp:50,
      atk:8, def:3,
      level:1, exp:0, expNeed:50,
      gold:0,
      equipment:{weapon:null,armor:null,ring:null},
      inventory:[],
      potions:3,
    },
    grid:[],       // 2D array of cell objects
    playerR:3, playerC:3,
    stairsR:7, stairsC:7,
    inCombat:false,
    combatEnemy:null,
    combatLog:[],
    currentView:'dungeon', // 'dungeon'|'town'|'combat'|'loot'
    pendingLoot:null,
  };
  generateFloor();
}

// ── Equipment Generation ──────────────────
const WEAPON_NAMES = ['短剑','铁剑','长剑','战斧','弯刀','战锤','刺剑','巨剑','秘法之刃','恶魔之牙'];
const ARMOR_NAMES = ['皮甲','锁子甲','板甲','鳞甲','暗影斗篷','龙鳞甲','圣盾铠甲','虚空护甲'];
const RING_NAMES = ['铜戒指','银戒指','红宝石戒指','蓝宝石戒指','骷髅戒指','巨龙之戒','贤者之石'];

function rollRarity(floor) {
  let r = Math.random();
  // Higher floors = better chances
  let bonus = Math.min(floor * 0.03, 0.20);
  let adjustedChance = [
    Math.max(0.15, RARITY_CHANCE[0] - bonus*2),
    Math.max(0.15, RARITY_CHANCE[1] - bonus),
    Math.min(0.45, RARITY_CHANCE[2] + bonus),
    Math.min(0.30, RARITY_CHANCE[3] + bonus*2),
  ];
  // Normalize
  let sum = adjustedChance.reduce((a,b)=>a+b,0);
  adjustedChance = adjustedChance.map(c=>c/sum);

  let cum = 0;
  for(let i=0;i<4;i++){
    cum += adjustedChance[i];
    if(r <= cum) return RARITIES[i];
  }
  return 'common';
}

function generateItem(slot, floor) {
  let mult = 1 + (floor-1) * 0.15;
  let rarity = rollRarity(floor);
  let rMult = RARITY_MULT[rarity];
  let atk=0, def=0, hp=0;
  let names;

  if(slot==='weapon'){
    names = WEAPON_NAMES;
    atk = Math.floor((3 + Math.random()*5) * mult * rMult);
  } else if(slot==='armor'){
    names = ARMOR_NAMES;
    def = Math.floor((2 + Math.random()*4) * mult * rMult);
  } else {
    names = RING_NAMES;
    hp = Math.floor((8 + Math.random()*12) * mult * rMult);
    if(Math.random()<0.5) atk = Math.floor((1+Math.random()*2)*mult*rMult);
    else def = Math.floor((1+Math.random()*2)*mult*rMult);
  }

  let name = names[Math.floor(Math.random()*names.length)];
  let prefix = rarity==='epic'?'精工 ':'';
  if(rarity==='legendary') prefix = ['上古 ','毁灭 ','不朽 '][Math.floor(Math.random()*3)];

  return {
    id: `${slot}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    name: prefix + name,
    slot, rarity,
    stats:{atk,def,hp},
    value: Math.floor((5+atk*2+def*2+hp) * (1+RARITY_MULT[rarity])),
  };
}

// ── Dungeon Generation ────────────────────
function generateFloor() {
  let grid = [];
  for(let r=0;r<GRID;r++){
    grid[r]=[];
    for(let c=0;c<GRID;c++){
      grid[r][c] = {type:'empty',revealed:false,monster:null,loot:null};
    }
  }

  // Place player start
  G.playerR = Math.floor(GRID/2);
  G.playerC = Math.floor(GRID/2);
  grid[G.playerR][G.playerC] = {type:'start',revealed:true,monster:null,loot:null};

  // Place stairs far from player
  let corners = [[0,0],[0,GRID-1],[GRID-1,0],[GRID-1,GRID-1]];
  let st = corners[Math.floor(Math.random()*4)];
  G.stairsR = st[0]; G.stairsC = st[1];
  grid[G.stairsR][G.stairsC] = {type:'stairs',revealed:false,monster:null,loot:null};

  // Place chests (2-4)
  let chestCount = 2 + Math.floor(Math.random()*3);
  placeRandom(grid, 'chest', chestCount);

  // Place monsters (fill ~35-45% of remaining empty cells)
  let totalCells = GRID*GRID;
  let monsterCount = Math.floor(totalCells * (0.35 + Math.random()*0.1));
  placeRandom(grid, 'monster', monsterCount);

  // Add some wall obstacles (a few cells)
  let wallCount = 2 + Math.floor(Math.random()*3);
  placeRandom(grid, 'wall', wallCount);

  G.grid = grid;
  revealAdjacent(G.playerR, G.playerC);
}

function placeRandom(grid, type, count) {
  let placed=0, attempts=0;
  while(placed<count && attempts<200){
    attempts++;
    let r=Math.floor(Math.random()*GRID), c=Math.floor(Math.random()*GRID);
    if(grid[r][c].type==='empty'){
      grid[r][c].type = type;
      if(type==='monster'){
        grid[r][c].monster = generateMonster();
      } else if(type==='chest'){
        grid[r][c].loot = generateLoot();
      }
      placed++;
    }
  }
}

function generateMonster() {
  let m = MONSTER_POOL[Math.floor(Math.random()*MONSTER_POOL.length)];
  let floorMult = 1 + (G.floor-1)*0.2;
  return {
    name:m.name, icon:m.icon,
    hp:Math.floor(m.baseHp*floorMult),
    maxHp:Math.floor(m.baseHp*floorMult),
    atk:Math.floor(m.baseAtk*floorMult),
    def:Math.floor(m.baseDef*floorMult),
    gold:Math.floor(m.gold*floorMult),
  };
}

function generateLoot() {
  // Random slot
  let slots = ['weapon','armor','ring'];
  let slot = slots[Math.floor(Math.random()*slots.length)];
  return generateItem(slot, G.floor);
}

// ── Visibility ────────────────────────────
function revealAdjacent(r, c) {
  for(let dr=-1;dr<=1;dr++){
    for(let dc=-1;dc<=1;dc++){
      let nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<GRID&&nc>=0&&nc<GRID){
        G.grid[nr][nc].revealed = true;
      }
    }
  }
}

// ── Player Stats ──────────────────────────
function getTotalStats() {
  let atk=G.player.atk, def=G.player.def, maxHp=G.player.maxHp;
  for(let slot of ['weapon','armor','ring']){
    let item = G.player.equipment[slot];
    if(item){
      atk += item.stats.atk;
      def += item.stats.def;
      maxHp += item.stats.hp;
    }
  }
  return {atk,def,maxHp};
}

function recalcMaxHp() {
  let stats = getTotalStats();
  let oldMax = G.player.maxHp;
  G.player.maxHp = stats.maxHp;
  if(G.player.hp > G.player.maxHp) G.player.hp = G.player.maxHp;
  if(oldMax > G.player.maxHp && G.player.hp > G.player.maxHp) G.player.hp = G.player.maxHp;
}

// ── Combat ────────────────────────────────
function startCombat(monster) {
  G.inCombat = true;
  G.combatEnemy = {...monster}; // copy
  G.combatLog = [`⚔️ 遭遇了 ${monster.icon} ${monster.name}！`];
  G.currentView = 'combat';
  render();
}

function playerAttack() {
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  let stats = getTotalStats();
  let dmg = Math.max(1, stats.atk - G.combatEnemy.def + Math.floor(Math.random()*4));
  G.combatEnemy.hp -= dmg;
  G.combatLog.push(`你对 ${G.combatEnemy.name} 造成 ${dmg} 点伤害`);
  if(G.combatEnemy.hp<=0){
    onVictory();
    return;
  }
  render();
  setTimeout(enemyTurn, 600);
}

function playerSkill() {
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  if(G.player.mp < 10){
    G.combatLog.push('⛔ 魔力不足！（需要10点）');
    render();
    return;
  }
  G.player.mp -= 10;
  let stats = getTotalStats();
  let dmg = Math.max(1, Math.floor(stats.atk*1.8) - G.combatEnemy.def + Math.floor(Math.random()*6));
  G.combatEnemy.hp -= dmg;
  G.combatLog.push(`✨ 你释放技能造成 ${dmg} 点伤害（消耗10MP）`);
  if(G.combatEnemy.hp<=0){
    onVictory();
    return;
  }
  render();
  setTimeout(enemyTurn, 600);
}

function playerPotion() {
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  if(G.player.potions<=0){
    G.combatLog.push('⛔ 没有药水了！');
    render();
    return;
  }
  G.player.potions--;
  let heal = Math.floor(G.player.maxHp * POTION_HEAL);
  G.player.hp = Math.min(G.player.maxHp, G.player.hp + heal);
  G.combatLog.push(`🧪 使用药水恢复 ${heal} 点生命`);
  render();
  setTimeout(enemyTurn, 800);
}

function enemyTurn() {
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  let dmg = Math.max(1, G.combatEnemy.atk - getTotalStats().def + Math.floor(Math.random()*3));
  G.player.hp -= dmg;
  G.combatLog.push(`${G.combatEnemy.name} 对你造成 ${dmg} 点伤害`);
  if(G.player.hp<=0){
    G.player.hp=0;
    G.combatLog.push('💀 你被击败了...');
    G.inCombat=false;
    G.combatEnemy=null;
    onDeath();
    return;
  }
  render();
}

function onVictory() {
  G.combatLog.push(`🎉 击败了 ${G.combatEnemy.name}！`);
  let gold = G.combatEnemy.gold;
  let exp = Math.floor(G.combatEnemy.maxHp * 1.5);
  G.player.gold += gold;
  G.player.exp += exp;
  G.combatLog.push(`💰 +${gold} 金币  ⭐ +${exp} 经验`);

  // Level up check
  while(G.player.exp >= G.player.expNeed){
    G.player.exp -= G.player.expNeed;
    G.player.level++;
    G.player.expNeed = Math.floor(G.player.expNeed * 1.5);
    G.player.atk += 2;
    G.player.def += 1;
    G.player.maxHp += 15;
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + 15);
    G.player.maxMp += 5;
    G.player.mp = Math.min(G.player.maxMp, G.player.mp + 5);
    G.combatLog.push(`⬆️ 升级！现在 ${G.player.level} 级`);
  }

  // Clear monster from grid
  let cell = G.grid[G.playerR][G.playerC];
  cell.type = 'empty';
  cell.monster = null;
  cell.revealed = true;
  revealAdjacent(G.playerR, G.playerC);

  G.inCombat = false;
  G.combatEnemy = null;
  G.currentView = 'dungeon';
  render();
}

function onDeath() {
  // Penalty: lose some gold
  let lost = Math.floor(G.player.gold * 0.3);
  G.player.gold -= lost;
  G.player.hp = Math.floor(G.player.maxHp * 0.3);
  G.player.mp = Math.floor(G.player.maxMp * 0.3);
  G.currentView = 'dungeon';
  alert(`💀 你被击败了！失去了 ${lost} 金币，回到城镇休整。`);
  goTown();
}

// ── Actions ───────────────────────────────
function moveTo(r, c) {
  if(G.inCombat) return;
  if(r<0||r>=GRID||c<0||c>=GRID) return;
  let cell = G.grid[r][c];
  if(cell.type==='wall') return;
  if(!cell.revealed) return; // Can only move to revealed or adjacent cells

  // Check if adjacent
  let dr=Math.abs(r-G.playerR), dc=Math.abs(c-G.playerC);
  if(dr+dc !== 1) return; // Must be adjacent (not diagonal)

  G.playerR = r;
  G.playerC = c;
  revealAdjacent(r, c);

  if(cell.type==='monster'){
    startCombat(cell.monster);
  } else if(cell.type==='chest'){
    openChest(cell);
  } else if(cell.type==='stairs'){
    promptStairs();
  }
  render();
}

function openChest(cell) {
  let item = cell.loot;
  G.pendingLoot = item;
  G.currentView = 'loot';
  cell.type = 'empty';
  cell.loot = null;
  render();
}

function collectLoot() {
  if(!G.pendingLoot) return;
  G.player.inventory.push(G.pendingLoot);
  G.pendingLoot = null;
  G.currentView = 'dungeon';
  render();
}

function discardLoot() {
  G.pendingLoot = null;
  G.currentView = 'dungeon';
  render();
}

function promptStairs() {
  G.currentView = 'stairs-prompt';
  render();
}

function goDeeper() {
  G.floor++;
  G.currentView = 'dungeon';
  generateFloor();
  render();
}

function goTown() {
  G.inCombat = false;
  G.combatEnemy = null;
  G.pendingLoot = null;
  // Heal in town
  G.player.hp = G.player.maxHp;
  G.player.mp = G.player.maxMp;
  G.player.potions = 3; // restock potions
  G.currentView = 'town';
  render();
}

function returnToDungeon() {
  G.currentView = 'dungeon';
  render();
}

function equipItem(item) {
  let slot = item.slot;
  let old = G.player.equipment[slot];
  G.player.equipment[slot] = item;
  G.player.inventory = G.player.inventory.filter(i=>i.id!==item.id);
  if(old) G.player.inventory.push(old);
  recalcMaxHp();
  render();
}

function unequipItem(slot) {
  let item = G.player.equipment[slot];
  if(!item) return;
  G.player.equipment[slot] = null;
  G.player.inventory.push(item);
  recalcMaxHp();
  render();
}

function sellItem(item) {
  G.player.gold += item.value;
  G.player.inventory = G.player.inventory.filter(i=>i.id!==item.id);
  render();
}

function discardItem(item) {
  G.player.inventory = G.player.inventory.filter(i=>i.id!==item.id);
  render();
}

// ── Render ────────────────────────────────
function render() {
  let app = document.getElementById('app');
  switch(G.currentView){
    case 'dungeon': app.innerHTML = renderDungeon(); break;
    case 'combat': app.innerHTML = renderCombat(); break;
    case 'loot': app.innerHTML = renderLoot(); break;
    case 'stairs-prompt': app.innerHTML = renderStairsPrompt(); break;
    case 'town': app.innerHTML = renderTown(); break;
  }
}

function renderTopBar() {
  let stats = getTotalStats();
  return `
    <div class="top-bar">
      <span class="floor">🏰 B${G.floor}F</span>
      <div class="stats">
        <span class="stat-hp">❤️${G.player.hp}/${stats.maxHp}</span>
        <span class="stat-mp">💧${G.player.mp}/${G.player.maxMp}</span>
        <span class="stat-gold">💰${G.player.gold}</span>
        <span>⭐${G.player.level}</span>
      </div>
    </div>`;
}

function renderDungeon() {
  let gridHtml = '';
  for(let r=0;r<GRID;r++){
    for(let c=0;c<GRID;c++){
      let cell = G.grid[r][c];
      let cls='cell';
      let icon='';
      let isPlayer = (r===G.playerR && c===G.playerC);

      if(isPlayer){
        cls+=' player current';
        icon='🧑';
      } else if(cell.revealed){
        cls+=' revealed';
        if(Math.abs(r-G.playerR)+Math.abs(c-G.playerC)===1) cls+=' adjacent';
        switch(cell.type){
          case 'stairs': cls+=' stairs'; icon='⬇️'; break;
          case 'chest': cls+=' chest'; icon='📦'; break;
          case 'monster': cls+=' monster'; icon=cell.monster?cell.monster.icon:'👾'; break;
          case 'wall': cls+=' wall'; icon='🧱'; break;
          default: icon='·'; break;
        }
      } else {
        icon='';
      }

      let onclick = '';
      if(Math.abs(r-G.playerR)+Math.abs(c-G.playerC)===1 && cell.revealed && cell.type!=='wall'){
        onclick = `onclick="moveTo(${r},${c})"`;
      }

      gridHtml += `<div class="${cls}" ${onclick}>${icon}</div>`;
    }
  }

  return `
    ${renderTopBar()}
    <div class="dungeon-wrap">
      <div class="dungeon-grid">${gridHtml}</div>
      <div style="text-align:center;margin-top:8px;font-size:0.75rem;color:var(--text-dim);">
        点击相邻格子移动 | 探索地牢寻找 ⬇️ 楼梯深入
      </div>
    </div>
    ${renderEquipBar()}
    <div class="bottom-panel">
      <div class="bottom-btns">
        <button class="btn btn-town" onclick="goTown()">🏠 回城休整</button>
        <button class="btn btn-stairs" onclick="goDeeper()" ${G.grid[G.playerR][G.playerC].type!=='stairs'?'disabled':''}>⬇️ 深入下层</button>
      </div>
    </div>`;
}

function renderEquipBar() {
  let html = '<div class="bottom-panel"><div class="player-equip">';
  for(let slot of ['weapon','armor','ring']){
    let item = G.player.equipment[slot];
    let name = item ? item.name : '空';
    let cls = item ? `rarity-${item.rarity}` : '';
    html += `<div class="equip-slot">
      <div class="slot-label">${SLOT_ICONS[slot]} ${SLOT_NAMES[slot]}</div>
      <div class="slot-item ${cls}">${name}</div>
    </div>`;
  }
  html += '</div></div>';
  return html;
}

function renderCombat() {
  let e = G.combatEnemy;
  let stats = getTotalStats();
  let hpPct = Math.max(0, e.hp/e.maxHp*100);
  let logHtml = G.combatLog.slice(-5).map(l=>`<div>${l}</div>`).join('');

  return `
    ${renderTopBar()}
    <div class="modal-overlay">
      <div class="modal-box">
        <h3>⚔️ 战斗</h3>
        <div class="combat-enemy">
          <span class="enemy-icon">${e.icon}</span>
          <div class="enemy-name">${e.name}</div>
          <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${hpPct}%"></div></div>
          <div class="combat-info">
            <span>❤️${e.hp}/${e.maxHp}</span>
            <span>⚔️${e.atk}</span>
            <span>🛡️${e.def}</span>
          </div>
        </div>
        <div class="combat-player-info">
          <span>❤️${G.player.hp}/${stats.maxHp}</span>
          <span>💧${G.player.mp}/${G.player.maxMp}</span>
          <span>🧪x${G.player.potions}</span>
          <span>⚔️${stats.atk} 🛡️${stats.def}</span>
        </div>
        <div class="combat-actions">
          <button class="btn" style="background:var(--atk)" onclick="playerAttack()">⚔️ 攻击</button>
          <button class="btn" style="background:var(--mp)" onclick="playerSkill()">✨ 技能</button>
          <button class="btn" style="background:var(--success)" onclick="playerPotion()">🧪 药水</button>
        </div>
        <div class="combat-log">${logHtml}</div>
      </div>
    </div>`;
}

function renderLoot() {
  let item = G.pendingLoot;
  if(!item) return renderDungeon();
  return `
    ${renderTopBar()}
    <div class="modal-overlay">
      <div class="modal-box" style="text-align:center;">
        <h3>🎁 发现宝物！</h3>
        <div class="loot-item rarity-${item.rarity}">
          <span class="item-icon">${SLOT_ICONS[item.slot]}</span>
          <div class="item-name" style="color:${RARITY_COLORS[item.rarity]}">${item.name}</div>
          <div class="item-rarity" style="color:${RARITY_COLORS[item.rarity]}">${RARITY_NAMES[item.rarity]}</div>
          <div class="item-stats">
            ${item.stats.atk>0?`⚔️+${item.stats.atk} `:''}
            ${item.stats.def>0?`🛡️+${item.stats.def} `:''}
            ${item.stats.hp>0?`❤️+${item.stats.hp} `:''}
            <br>售价 💰${item.value}
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-stairs" onclick="collectLoot()">✅ 收入背包</button>
          <button class="btn" style="background:#555" onclick="discardLoot()">🗑️ 丢弃</button>
        </div>
      </div>
    </div>`;
}

function renderStairsPrompt() {
  return `
    ${renderTopBar()}
    <div class="modal-overlay">
      <div class="modal-box" style="text-align:center;">
        <h3>⬇️ 发现楼梯！</h3>
        <p style="margin-bottom:16px;color:var(--text-dim);">进入 B${G.floor+1}F（敌人更强，装备更好）</p>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-stairs" onclick="goDeeper()">⬇️ 深入下层</button>
          <button class="btn btn-town" onclick="goTown()">🏠 先回城</button>
          <button class="btn" style="background:#555" onclick="returnToDungeon()">↩️ 继续探索</button>
        </div>
      </div>
    </div>`;
}

function renderTown() {
  let invHtml = '';
  if(G.player.inventory.length===0){
    invHtml = '<div style="text-align:center;color:var(--text-dim);padding:20px;">背包空空如也</div>';
  } else {
    invHtml = G.player.inventory.map(item=>`
      <div class="item-row">
        <div style="font-size:1.3rem;">${SLOT_ICONS[item.slot]}</div>
        <div class="item-info">
          <div style="color:${RARITY_COLORS[item.rarity]};font-weight:600;">${item.name}</div>
          <div style="font-size:0.7rem;color:var(--text-dim);">
            ${item.stats.atk>0?`⚔️${item.stats.atk} `:''}
            ${item.stats.def>0?`🛡️${item.stats.def} `:''}
            ${item.stats.hp>0?`❤️${item.stats.hp}`:''}
          </div>
        </div>
        <div class="item-btns">
          <button class="mini-btn btn-equip" onclick="equipItem(G.player.inventory.find(i=>i.id==='${item.id}'))">装备</button>
          <button class="mini-btn btn-sell" onclick="sellItem(G.player.inventory.find(i=>i.id==='${item.id}'))">卖💰${item.value}</button>
        </div>
      </div>
    `).join('');
  }

  let equipHtml = '';
  for(let slot of ['weapon','armor','ring']){
    let item = G.player.equipment[slot];
    equipHtml += `
      <div style="margin-bottom:8px;">
        <span style="color:var(--text-dim);font-size:0.75rem;">${SLOT_ICONS[slot]} ${SLOT_NAMES[slot]}:</span>
        ${item ? `
          <span style="color:${RARITY_COLORS[item.rarity]};font-weight:600;">${item.name}</span>
          <span style="font-size:0.7rem;color:var(--text-dim);">
            ${item.stats.atk>0?` ⚔️${item.stats.atk}`:''}
            ${item.stats.def>0?` 🛡️${item.stats.def}`:''}
            ${item.stats.hp>0?` ❤️${item.stats.hp}`:''}
          </span>
          <button style="background:none;border:none;color:var(--btn-danger);cursor:pointer;font-size:0.7rem;" onclick="unequipItem('${slot}')">卸下</button>
        ` : '<span style="color:#555;">空</span>'}
      </div>`;
  }

  let stats = getTotalStats();
  return `
    ${renderTopBar()}
    <div style="flex:1;overflow-y:auto;padding:14px;">
      <div class="town-section">
        <h4>👤 角色状态</h4>
        <div style="background:#0a0a1e;border-radius:8px;padding:10px;font-size:0.82rem;line-height:1.8;">
          ⭐ Lv.${G.player.level} | EXP ${G.player.exp}/${G.player.expNeed}<br>
          ❤️ ${G.player.hp}/${stats.maxHp} | 💧 ${G.player.mp}/${G.player.maxMp}<br>
          ⚔️ 攻击 ${stats.atk} | 🛡️ 防御 ${stats.def}<br>
          💰 ${G.player.gold} 金币 | 🧪 药水 x${G.player.potions}
        </div>
      </div>

      <div class="town-section">
        <h4>🛡️ 当前装备</h4>
        ${equipHtml}
      </div>

      <div class="town-section">
        <h4>🎒 背包 (${G.player.inventory.length})</h4>
        ${invHtml}
      </div>
    </div>
    <div class="bottom-panel">
      <div class="bottom-btns">
        <button class="btn btn-stairs" onclick="returnToDungeon()">⚔️ 进入地牢</button>
      </div>
    </div>`;
}

// ── Init ──────────────────────────────────
initGame();
render();

// Keyboard controls
document.addEventListener('keydown', function(e){
  if(G.inCombat||G.currentView!=='dungeon') return;
  let r=G.playerR, c=G.playerC;
  switch(e.key){
    case 'ArrowUp':case 'w':case 'W': r--; break;
    case 'ArrowDown':case 's':case 'S': r++; break;
    case 'ArrowLeft':case 'a':case 'A': c--; break;
    case 'ArrowRight':case 'd':case 'D': c++; break;
    default: return;
  }
  e.preventDefault();
  let cell = G.grid[r]?.[c];
  if(cell && cell.revealed && cell.type!=='wall'){
    moveTo(r,c);
  }
});
</script>
</body>
</html>
