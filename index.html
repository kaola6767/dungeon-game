<title>深渊洞窟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --bg:#0d0d1a; --panel:#111128; --gold:#f0c040;
  --hp:#f04040; --mp:#40a0f0; --text:#e8e0d0;
  --text-dim:#908878; --btn:#383878; --btn-red:#883838;
  --btn-green:#387838;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Press Start 2P','Courier New',monospace;
  min-height:100vh;
  display:flex;justify-content:center;
  user-select:none;-webkit-user-select:none;
  image-rendering:pixelated;-webkit-image-rendering:pixelated;
}
#app{
  width:100%;max-width:440px;
  display:flex;flex-direction:column;
  min-height:100vh;
}

/* Top bar */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;background:var(--panel);
  border-bottom:2px solid #2a2a50;
  font-size:0.5rem;gap:4px;
}
.top-bar .floor{color:var(--gold);}
.top-bar .stats{display:flex;gap:8px;align-items:center;}
.stat-item{display:flex;align-items:center;gap:2px;}
.stat-hp{color:var(--hp)}.stat-mp{color:var(--mp)}.stat-gold{color:var(--gold)}

/* Canvas area */
.canvas-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px;flex-direction:column;gap:6px;
}
canvas{
  border:3px solid #2a2a50;
  image-rendering:pixelated;
  border-radius:0;
  max-width:100%;
  height:auto;
  box-shadow:0 0 20px rgba(40,40,120,0.3);
}
.hint-text{
  font-size:0.4rem;color:var(--text-dim);
  text-align:center;line-height:1.8;
}

/* Equip bar */
.equip-bar{
  display:flex;gap:4px;padding:6px 10px;
  background:var(--panel);
}
.equip-slot{
  flex:1;background:#060612;padding:5px 4px;
  text-align:center;font-size:0.38rem;line-height:1.6;
  border:1px solid #2a2a50;
}
.equip-slot .slot-label{color:var(--text-dim);}
.equip-slot .slot-item{color:#888;}
.equip-slot .slot-item.rare2{color:#4da6ff;}
.equip-slot .slot-item.rare3{color:#c471ed;}
.equip-slot .slot-item.rare4{color:#ff8c00;}

/* Bottom buttons */
.bottom-bar{
  display:flex;gap:6px;padding:8px 10px;
  background:var(--panel);border-top:2px solid #2a2a50;
}
.pxl-btn{
  flex:1;padding:10px 0;border:none;cursor:pointer;
  font-family:'Press Start 2P','Courier New',monospace;
  font-size:0.42rem;color:#fff;letter-spacing:1px;
  border:2px solid;
  transition:transform 0.05s;
}
.pxl-btn:active{transform:scale(0.95);}
.pxl-btn:disabled{opacity:0.3;pointer-events:none;}
.pxl-btn.town{border-color:#6060b0;background:var(--btn)}
.pxl-btn.back{border-color:#b06060;background:var(--btn-red)}
.pxl-btn.go{border-color:#60b060;background:var(--btn-green)}

/* Modals */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}
.modal-box{
  background:var(--panel);padding:16px;
  max-width:360px;width:90%;max-height:85vh;overflow-y:auto;
  border:3px solid #3a3a70;
  font-size:0.45rem;line-height:1.8;
}
.modal-box h3{text-align:center;margin-bottom:10px;font-size:0.6rem;}
.modal-box h4{color:var(--text-dim);font-size:0.45rem;margin:10px 0 6px;}

/* Combat */
.combat-header{text-align:center;margin-bottom:10px;}
.combat-header .monster-sprite{display:flex;justify-content:center;margin-bottom:6px;}
.combat-header .monster-name{font-size:0.55rem;margin:6px 0;}
.hp-bar{height:10px;background:#222;border:1px solid #444;margin:8px 0;}
.hp-bar .fill{height:100%;background:var(--hp);transition:width 0.3s;}
.combat-stats{display:flex;justify-content:space-around;font-size:0.38rem;color:var(--text-dim);}
.combat-actions{display:flex;gap:6px;margin-top:10px;}
.combat-actions .pxl-btn{font-size:0.38rem;padding:8px 0;}
.combat-log{margin-top:10px;max-height:80px;overflow-y:auto;font-size:0.36rem;color:var(--text-dim);}

/* Loot */
.loot-card{
  text-align:center;padding:14px;margin:10px 0;
  border:3px solid #444;
}
.loot-card.rare2{border-color:#4da6ff;box-shadow:0 0 10px rgba(77,166,255,0.2)}
.loot-card.rare3{border-color:#c471ed;box-shadow:0 0 14px rgba(196,113,237,0.3)}
.loot-card.rare4{border-color:#ff8c00;box-shadow:0 0 18px rgba(255,140,0,0.4)}
.loot-card .loot-name{font-size:0.5rem;margin:6px 0;}
.loot-card .loot-stats{font-size:0.38rem;color:var(--text-dim);}

/* Town */
.town-section{margin-bottom:10px;}
.item-row{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;background:#060612;border:1px solid #2a2a50;
  margin-bottom:4px;font-size:0.38rem;
}
.item-row .item-info{flex:1;line-height:1.6;}
.micro-btn{
  padding:3px 8px;border:1px solid #555;
  background:#222;color:#ccc;cursor:pointer;
  font-family:'Press Start 2P','Courier New',monospace;
  font-size:0.32rem;
}
.micro-btn.equip{color:#4040f0;border-color:#4040f0}
.micro-btn.sell{color:#888;border-color:#555}
.micro-btn.unequip{color:#f04040;border-color:#f04040}

/* Death */
.death-overlay{
  position:fixed;inset:0;background:rgba(80,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
  z-index:200;flex-direction:column;
}
.death-text{font-size:0.7rem;color:#f04040;margin-bottom:16px;text-align:center;line-height:2;}
</style>
</head>

// ── Color mapping helper ──────────────────
function spriteColors(sprite) {
  // Return a flat array of RGBA values for a 16x16 sprite
  let data = new Uint8Array(16*16*4);
  for(let y=0;y<16;y++){
    for(let x=0;x<16;x++){
      let k = sprite[y][x];
      let hex = P[k] || 'transparent';
      let idx = (y*16+x)*4;
      if(hex==='transparent'){
        data[idx]=0;data[idx+1]=0;data[idx+2]=0;data[idx+3]=0;
      } else {
        let r=parseInt(hex.slice(1,3),16);
        let g=parseInt(hex.slice(3,5),16);
        let b=parseInt(hex.slice(5,7),16);
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=255;
      }
    }
  }
  return data;
}

// Cache sprite ImageData
const spriteCache = {};
function getSpriteImage(name) {
  if(spriteCache[name]) return spriteCache[name];
  let s = SP[name];
  if(!s) return null;
  let data = spriteColors(s);
  spriteCache[name] = new ImageData(new Uint8ClampedArray(data), 16, 16);
  return spriteCache[name];
}

// Offscreen canvases for scaled sprites
function drawSprite(ctx, name, dx, dy, scale) {
  let img = getSpriteImage(name);
  if(!img) return;
  // Draw pixel-by-pixel for perfect pixel art
  let off = document.createElement('canvas');
  off.width=16; off.height=16;
  off.getContext('2d').putImageData(img,0,0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, dx, dy, 16*scale, 16*scale);
}

// ── Game State ────────────────────────────
const GRID=8, SPRITE_SIZE=3, CELL=48;
let G;
const MONSTERS = [

const SLOTS=['weapon','armor','ring'];
const SLOT_CH=['武器','护甲','戒指'];
const RARITY_NAME=['普通','稀有','史诗','传说'];
const RARITY_COLOR=['#b0b0b0','#4da6ff','#c471ed','#ff8c00'];
const RARITY_MULT=[1,1.5,2.5,4];
const WNAMES=['短剑','铁剑','长剑','战斧','弯刀','战锤','刺剑','巨剑','秘法之刃','恶魔之牙'];
const ANAMES=['皮甲','锁子甲','板甲','鳞甲','暗影斗篷','龙鳞甲','圣盾铠甲','虚空护甲'];
const RNAMES=['铜戒指','银戒指','红宝石戒指','蓝宝石戒指','骷髅戒指','巨龙之戒','贤者之石'];

function initGame(){
  G={
    floor:1,
    player:{hp:100,maxHp:100,mp:50,maxMp:50,atk:8,def:3,
      level:1,exp:0,expNeed:50,gold:0,
      equip:{weapon:null,armor:null,ring:null},
      inventory:[],potions:3},
    grid:[], playerR:3,playerC:3, stairsR:7,stairsC:7,
    inCombat:false,combatEnemy:null,combatLog:[],
    view:'dungeon', pendingLoot:null,
  };
  generateFloor();
}

function rollRarity(floor){
  let r=Math.random();
  let b=Math.min(floor*0.03,0.20);
  let ch=[Math.max(0.15,0.50-b*2),Math.max(0.15,0.30-b),Math.min(0.45,0.15+b),Math.min(0.30,0.05+b*2)];
  let s=ch.reduce((a,b)=>a+b,0); ch=ch.map(c=>c/s);
  let cum=0;
  for(let i=0;i<4;i++){cum+=ch[i]; if(r<=cum) return i;}
  return 0;
}

function genItem(slot,floor){
  let mult=1+(floor-1)*0.15;
  let rare=rollRarity(floor);
  let rm=RARITY_MULT[rare];
  let atk=0,def=0,hp=0;
  let names=slot==='weapon'?WNAMES:slot==='armor'?ANAMES:RNAMES;
  if(slot==='weapon') atk=Math.floor((3+Math.random()*5)*mult*rm);
  else if(slot==='armor') def=Math.floor((2+Math.random()*4)*mult*rm);
  else{hp=Math.floor((8+Math.random()*12)*mult*rm); if(Math.random()<0.5) atk=Math.floor((1+Math.random()*2)*mult*rm); else def=Math.floor((1+Math.random()*2)*mult*rm);}
  let name=names[Math.floor(Math.random()*names.length)];
  let pre=''; if(rare===2) pre='精工 '; if(rare===3) pre=['上古 ','毁灭 ','不朽 '][Math.floor(Math.random()*3)];
  return {id:`${slot}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,name:pre+name,slot,rarity:rare,stats:{atk,def,hp},value:Math.floor((5+atk*2+def*2+hp)*(1+rm))};
}

function genMonster(){
  let t=MONSTERS[Math.floor(Math.random()*MONSTERS.length)];
  let fm=1+(G.floor-1)*0.2;
  return {name:t.name,sprite:t.sprite,hp:Math.floor(t.hp*fm),maxHp:Math.floor(t.hp*fm),atk:Math.floor(t.atk*fm),def:Math.floor(t.def*fm),gold:Math.floor(t.gold*fm)};
}

function generateFloor(){
  let grid=[];
  for(let r=0;r<GRID;r++){grid[r]=[]; for(let c=0;c<GRID;c++) grid[r][c]={type:'empty',revealed:false,monster:null,loot:null};}
  G.playerR=Math.floor(GRID/2); G.playerC=Math.floor(GRID/2);
  grid[G.playerR][G.playerC]={type:'start',revealed:true,monster:null,loot:null};
  let corners=[[0,0],[0,GRID-1],[GRID-1,0],[GRID-1,GRID-1]];
  let st=corners[Math.floor(Math.random()*4)];
  G.stairsR=st[0];G.stairsC=st[1];
  grid[G.stairsR][G.stairsC]={type:'stairs',revealed:false,monster:null,loot:null};
  let emptyCells=[];
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(grid[r][c].type==='empty') emptyCells.push([r,c]);
  // shuffle
  for(let i=emptyCells.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[emptyCells[i],emptyCells[j]]=[emptyCells[j],emptyCells[i]];}
  let chestCount=2+Math.floor(Math.random()*3);
  for(let i=0;i<chestCount&&i<emptyCells.length;i++){let[r,c]=emptyCells[i]; grid[r][c].type='chest'; grid[r][c].loot=genItem(SLOTS[Math.floor(Math.random()*3)],G.floor);}
  let monsterIdx=chestCount;
  let monsterCount=Math.floor(GRID*GRID*0.35+Math.random()*0.1);
  for(let i=0;i<monsterCount&&monsterIdx+i<emptyCells.length;i++){let[r,c]=emptyCells[monsterIdx+i]; grid[r][c].type='monster'; grid[r][c].monster=genMonster();}
  let wallIdx=monsterIdx+monsterCount;
  let wallCount=2+Math.floor(Math.random()*3);
  for(let i=0;i<wallCount&&wallIdx+i<emptyCells.length;i++){let[r,c]=emptyCells[wallIdx+i]; grid[r][c].type='wall';}
  G.grid=grid;
  reveal(G.playerR,G.playerC);
}

function reveal(r,c){
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    let nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<GRID&&nc>=0&&nc<GRID) G.grid[nr][nc].revealed=true;
  }
}

function totalStats(){
  let a=G.player.atk,d=G.player.def,m=G.player.maxHp;
  for(let sl of SLOTS){let it=G.player.equip[sl]; if(it){a+=it.stats.atk;d+=it.stats.def;m+=it.stats.hp;}}
  return{atk:a,def:d,maxHp:m};
}

function recalcHp(){let ts=totalStats();G.player.maxHp=ts.maxHp;if(G.player.hp>G.player.maxHp)G.player.hp=G.player.maxHp;}

// ── Canvas Rendering ──────────────────────
function renderDungeonCanvas(canvas){
  let ctx=canvas.getContext('2d');
  let size=GRID*CELL;
  canvas.width=size;canvas.height=size;
  ctx.fillStyle='#0a0a18'; ctx.fillRect(0,0,size,size);

  for(let r=0;r<GRID;r++){
    for(let c=0;c<GRID;c++){
      let cell=G.grid[r][c];
      let x=c*CELL,y=r*CELL;
      let isPlayer=(r===G.playerR&&c===G.playerC);

      if(!cell.revealed){
        // Fog
        ctx.fillStyle='#0d0d1a';
        ctx.fillRect(x,y,CELL,CELL);
        // Dither pattern for fog
        ctx.fillStyle='#151528';
        for(let fy=0;fy<CELL;fy+=6) for(let fx=(fy%12===0?0:6);fx<CELL;fx+=12){
          ctx.fillRect(x+fx,y+fy,2,2);
        }
        ctx.strokeStyle='#1a1a30';
        ctx.strokeRect(x,y,CELL,CELL);
        continue;
      }

      // Floor tile
      ctx.fillStyle='#12122a';
      ctx.fillRect(x,y,CELL,CELL);

      // Subtle grid lines
      ctx.strokeStyle='#1e1e3a';
      ctx.strokeRect(x,y,CELL,CELL);

      // Floor texture dots
      ctx.fillStyle='#181835';
      for(let fy=0;fy<CELL;fy+=4) for(let fx=0;fx<CELL;fx+=4){
        if((fx+fy)%8===0) ctx.fillRect(x+fx,y+fy,1,1);
      }

      let spriteName=null;
      let spriteTint=null;
      let isAdjacent = (Math.abs(r-G.playerR)+Math.abs(c-G.playerC)===1);

      if(isPlayer){
        spriteName='player';
        // Highlight current cell
        ctx.fillStyle='rgba(80,200,80,0.15)';
        ctx.fillRect(x,y,CELL,CELL);
      } else if(cell.type==='stairs'){
        spriteName='stairs';
      } else if(cell.type==='chest'){
        spriteName='chest';
      } else if(cell.type==='monster'){
        spriteName=cell.monster?cell.monster.sprite:'slime';
      } else if(cell.type==='wall'){
        spriteName='wall_brick';
      }

      // Adjacent cell highlight
      if(isAdjacent && !isPlayer && cell.type!=='wall'){
        ctx.fillStyle='rgba(60,60,120,0.2)';
        ctx.fillRect(x,y,CELL,CELL);
        // dashed border
        ctx.strokeStyle='rgba(100,100,200,0.5)';
        ctx.setLineDash([4,4]);
        ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
        ctx.setLineDash([]);
      }

      // Draw sprite
      if(spriteName){
        drawSprite(ctx, spriteName, x+4, y+4, 2.5);
      }

      // Player glow
      if(isPlayer){
        ctx.strokeStyle='#80ff80';
        ctx.setLineDash([3,2]);
        ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
        ctx.setLineDash([]);
      }
    }
  }
}

function renderCombatSprite(canvas, spriteName){
  let ctx=canvas.getContext('2d');
  let s=40;
  canvas.width=s;canvas.height=s;
  ctx.fillStyle='transparent';ctx.clearRect(0,0,s,s);
  drawSprite(ctx,spriteName,4,4,2);
}

// ── UI Render ────────────────────────────
function hTopBar(){
  let ts=totalStats();
  return `<div class="top-bar">
    <span class="floor">B${G.floor}F</span>
    <div class="stats">
      <span class="stat-item stat-hp">♥${G.player.hp}/${ts.maxHp}</span>
      <span class="stat-item stat-mp">♦${G.player.mp}/${G.player.maxMp}</span>
      <span class="stat-item stat-gold">★${G.player.gold}</span>
      <span>Lv${G.player.level}</span>
    </div></div>`;
}

function hEquipBar(){
  let h='<div class="equip-bar">';
  for(let i=0;i<3;i++){
    let sl=SLOTS[i]; let it=G.player.equip[sl];
    let nm=it?it.name:'-'; let rc=it?`rare${it.rarity+1}`:'';
    h+=`<div class="equip-slot"><div class="slot-label">${SLOT_CH[i]}</div><div class="slot-item ${rc}">${nm}</div></div>`;
  }
  h+='</div>'; return h;
}

function r(){
  let app=document.getElementById('app');
  if(G.inCombat||G.view==='combat') app.innerHTML=rCombat();
  else if(G.view==='loot') app.innerHTML=rLoot();
  else if(G.view==='stairs') app.innerHTML=rStairs();
  else if(G.view==='town') app.innerHTML=rTown();
  else app.innerHTML=rDungeon();
  // Re-render canvas after DOM update
  if(G.view==='dungeon'&&!G.inCombat){
    let c=document.getElementById('dg');
    if(c) renderDungeonCanvas(c);
  }
  if(G.view==='combat'){
    let c=document.getElementById('cs');
    if(c&&G.combatEnemy) renderCombatSprite(c,G.combatEnemy.sprite);
  }
}

function rDungeon(){
  return `${hTopBar()}
  <div class="canvas-wrap">
    <canvas id="dg" style="width:${GRID*CELL}px;height:${GRID*CELL}px;"></canvas>
    <div class="hint-text">点击相邻格子移动 | 键盘WASD/方向键</div>
  </div>
  ${hEquipBar()}
  <div class="bottom-bar">
    <button class="pxl-btn town" onclick="goTown()">回 城</button>
    <button class="pxl-btn go" onclick="goDeeper()" ${(G.grid[G.playerR]&&G.grid[G.playerR][G.playerC].type==='stairs')?'':'disabled'}>深入下层</button>
  </div>`;
}

function rCombat(){
  let e=G.combatEnemy; if(!e) return rDungeon();
  let ts=totalStats();
  let php=Math.max(0,e.hp/e.maxHp*100);
  let logH=G.combatLog.slice(-5).map(l=>`<div>${l}</div>`).join('');
  return `${hTopBar()}
  <div class="modal-bg"><div class="modal-box">
    <h3>⚔ 战 斗</h3>
    <div class="combat-header">
      <div class="monster-sprite"><canvas id="cs" width="40" height="40"></canvas></div>
      <div class="monster-name">${e.name}</div>
      <div class="hp-bar"><div class="fill" style="width:${php}%"></div></div>
      <div class="combat-stats"><span>♥${e.hp}/${e.maxHp}</span><span>⚔${e.atk}</span><span>🛡${e.def}</span></div>
    </div>
    <div class="combat-stats" style="margin-bottom:8px;">
      <span>♥${G.player.hp}/${ts.maxHp}</span><span>♦${G.player.mp}/${G.player.maxMp}</span><span>🧪x${G.player.potions}</span>
    </div>
    <div class="combat-actions">
      <button class="pxl-btn go" style="border-color:#f37121;background:#883838" onclick="attack()">攻 击</button>
      <button class="pxl-btn town" style="border-color:#4888d8;background:#284878" onclick="skill()">技 能</button>
      <button class="pxl-btn go" onclick="usePotion()">药 水</button>
    </div>
    <div class="combat-log">${logH}</div>
  </div></div>`;
}

function rLoot(){
  let it=G.pendingLoot; if(!it) return rDungeon();
  return `${hTopBar()}
  <div class="modal-bg"><div class="modal-box" style="text-align:center;">
    <h3>☆ 宝 物 ☆</h3>
    <div class="loot-card rare${it.rarity+1}">
      <div style="font-size:1.2rem;">${it.slot==='weapon'?'⚔':it.slot==='armor'?'🛡':'💍'}</div>
      <div class="loot-name" style="color:${RARITY_COLOR[it.rarity]}">${it.name}</div>
      <div style="font-size:0.35rem;color:${RARITY_COLOR[it.rarity]}">${RARITY_NAME[it.rarity]}</div>
      <div class="loot-stats">${it.stats.atk>0?'⚔+'+it.stats.atk+' ':''}${it.stats.def>0?'🛡+'+it.stats.def+' ':''}${it.stats.hp>0?'♥+'+it.stats.hp+' ':''} | 售价★${it.value}</div>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="pxl-btn go" onclick="collectLoot()">收 入</button>
      <button class="pxl-btn back" onclick="discardLoot()">丢 弃</button>
    </div>
  </div></div>`;
}

function rStairs(){
  return `${hTopBar()}
  <div class="modal-bg"><div class="modal-box" style="text-align:center;">
    <h3>▼ 楼 梯</h3>
    <p style="margin:10px 0;color:var(--text-dim);">进入 B${G.floor+1}F（更强敌人，更好装备）</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="pxl-btn go" style="flex:1 0 45%;" onclick="goDeeper()">深 入</button>
      <button class="pxl-btn town" style="flex:1 0 45%;" onclick="goTown()">回 城</button>
      <button class="pxl-btn back" style="flex:1 0 100%;" onclick="stayDungeon()">继续探索</button>
    </div>
  </div></div>`;
}

function rTown(){
  let invH='';
  if(G.player.inventory.length===0) invH='<div style="text-align:center;color:var(--text-dim);padding:12px;">背包空空如也</div>';
  else invH=G.player.inventory.map(it=>`
    <div class="item-row">
      <div style="font-size:0.6rem;">${it.slot==='weapon'?'⚔':it.slot==='armor'?'🛡':'💍'}</div>
      <div class="item-info">
        <div style="color:${RARITY_COLOR[it.rarity]}">${it.name}</div>
        <div>${it.stats.atk>0?'⚔'+it.stats.atk+' ':''}${it.stats.def>0?'🛡'+it.stats.def+' ':''}${it.stats.hp>0?'♥'+it.stats.hp:''}</div>
      </div>
      <button class="micro-btn equip" onclick="equipItem('${it.id}')">装备</button>
      <button class="micro-btn sell" onclick="sellItem('${it.id}')">卖★${it.value}</button>
    </div>`).join('');

  let equipH='';
  for(let i=0;i<3;i++){
    let sl=SLOTS[i];let it=G.player.equip[sl];
    equipH+=`<div style="padding:3px 0;font-size:0.38rem;">
      ${SLOT_CH[i]}: ${it?`<span style="color:${RARITY_COLOR[it.rarity]}">${it.name}</span> ${it.stats.atk>0?'⚔'+it.stats.atk:''}${it.stats.def>0?'🛡'+it.stats.def:''}${it.stats.hp>0?'♥'+it.stats.hp:''} <button class="micro-btn unequip" onclick="unequipItem('${sl}')">卸下</button>`:'<span style="color:#555;">空</span>'}
    </div>`;
  }

  let ts=totalStats();
  return `${hTopBar()}
  <div style="flex:1;overflow-y:auto;padding:10px;">
    <div class="town-section">
      <h4>◆ 状 态</h4>
      <div style="background:#060612;padding:8px;font-size:0.38rem;line-height:2;border:1px solid #2a2a50;">
        Lv${G.player.level} | EXP ${G.player.exp}/${G.player.expNeed} | ♥${G.player.hp}/${ts.maxHp} ♦${G.player.mp}/${G.player.maxMp}<br>
        ⚔${ts.atk} 🛡${ts.def} | ★${G.player.gold} | 🧪x${G.player.potions}
      </div>
    </div>
    <div class="town-section">
      <h4>◆ 装 备</h4>
      ${equipH}
    </div>
    <div class="town-section">
      <h4>◆ 背 包 (${G.player.inventory.length})</h4>
      ${invH}
    </div>
  </div>
  <div class="bottom-bar">
    <button class="pxl-btn go" onclick="returnToDungeon()">进入地牢</button>
  </div>`;
}

// ── Actions ───────────────────────────────
function moveTo(r,c){
  if(G.inCombat||G.view!=='dungeon') return;
  if(r<0||r>=GRID||c<0||c>=GRID) return;
  let cell=G.grid[r][c];
  if(cell.type==='wall'||!cell.revealed) return;
  let dr=Math.abs(r-G.playerR),dc=Math.abs(c-G.playerC);
  if(dr+dc!==1) return;
  G.playerR=r;G.playerC=c;reveal(r,c);
  if(cell.type==='monster'){startCombat(cell.monster);return;}
  if(cell.type==='chest'){G.pendingLoot=cell.loot;G.view='loot';cell.type='empty';cell.loot=null;}
  if(cell.type==='stairs'){G.view='stairs';}
  r();
}

function startCombat(mob){
  G.inCombat=true;G.combatEnemy={...mob};G.combatLog=[`遭遇 ${mob.name} ！`];
  G.view='combat';r();
}
function attack(){
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  let ts=totalStats(); let e=G.combatEnemy;
  let dmg=Math.max(1,ts.atk-e.def+Math.floor(Math.random()*4));
  e.hp-=dmg; G.combatLog.push(`造成 ${dmg} 伤害`);
  if(e.hp<=0){victory();return;}
  r();setTimeout(enemyAct,500);
}
function skill(){
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  if(G.player.mp<10){G.combatLog.push('魔力不足！');r();return;}
  G.player.mp-=10; let ts=totalStats(); let e=G.combatEnemy;
  let dmg=Math.max(1,Math.floor(ts.atk*1.8)-e.def+Math.floor(Math.random()*6));
  e.hp-=dmg; G.combatLog.push(`释放技能 ${dmg} 伤害`);
  if(e.hp<=0){victory();return;}
  r();setTimeout(enemyAct,500);
}
function usePotion(){
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  if(G.player.potions<=0){G.combatLog.push('没有药水了！');r();return;}
  G.player.potions--;
  let hl=Math.floor(G.player.maxHp*0.35);
  G.player.hp=Math.min(G.player.maxHp,G.player.hp+hl);
  G.combatLog.push(`使用药水 +${hl} HP`);
  r();setTimeout(enemyAct,600);
}
function enemyAct(){
  if(!G.inCombat||G.combatEnemy.hp<=0) return;
  let ts=totalStats(); let e=G.combatEnemy;
  let dmg=Math.max(1,e.atk-ts.def+Math.floor(Math.random()*3));
  G.player.hp-=dmg; G.combatLog.push(`${e.name} 造成 ${dmg} 伤害`);
  if(G.player.hp<=0){G.player.hp=0;death();return;}
  r();
}
function victory(){
  let e=G.combatEnemy;
  G.combatLog.push(`击败 ${e.name}！`);
  let gold=e.gold,exp=Math.floor(e.maxHp*1.5);
  G.player.gold+=gold;G.player.exp+=exp;
  G.combatLog.push(`+${gold}金币 +${exp}经验`);
  while(G.player.exp>=G.player.expNeed){
    G.player.exp-=G.player.expNeed;G.player.level++;
    G.player.expNeed=Math.floor(G.player.expNeed*1.5);
    G.player.atk+=2;G.player.def+=1;G.player.maxHp+=15;
    G.player.hp=Math.min(G.player.maxHp,G.player.hp+15);
    G.player.maxMp+=5;G.player.mp=Math.min(G.player.maxMp,G.player.mp+5);
    G.combatLog.push(`升级！Lv${G.player.level}`);
  }
  let cell=G.grid[G.playerR][G.playerC];cell.type='empty';cell.monster=null;cell.revealed=true;
  reveal(G.playerR,G.playerC);
  G.inCombat=false;G.combatEnemy=null;G.view='dungeon';r();
}
function death(){
  let lost=Math.floor(G.player.gold*0.3);
  G.player.gold-=lost;
  G.player.hp=Math.floor(G.player.maxHp*0.3);
  G.player.mp=Math.floor(G.player.maxMp*0.3);
  G.inCombat=false;G.combatEnemy=null;
  let app=document.getElementById('app');
  app.innerHTML=`<div class="death-overlay"><div class="death-text">你 被 击 败 了<br>失去 ${lost} 金币</div><button class="pxl-btn town" onclick="goTown()" style="font-size:0.5rem;padding:12px 24px;">回 城</button></div>`;
}
function collectLoot(){if(G.pendingLoot){G.player.inventory.push(G.pendingLoot);G.pendingLoot=null;}G.view='dungeon';r();}
function discardLoot(){G.pendingLoot=null;G.view='dungeon';r();}
function goDeeper(){G.floor++;G.view='dungeon';generateFloor();r();}
function stayDungeon(){G.view='dungeon';r();}
function goTown(){G.inCombat=false;G.combatEnemy=null;G.pendingLoot=null;G.player.hp=G.player.maxHp;G.player.mp=G.player.maxMp;G.player.potions=3;G.view='town';r();}
function returnToDungeon(){G.view='dungeon';r();}
function equipItem(id){
  let it=G.player.inventory.find(i=>i.id===id); if(!it) return;
  let old=G.player.equip[it.slot];G.player.equip[it.slot]=it;
  G.player.inventory=G.player.inventory.filter(i=>i.id!==id);
  if(old) G.player.inventory.push(old);recalcHp();r();
}
function unequipItem(sl){let it=G.player.equip[sl];if(!it)return;G.player.equip[sl]=null;G.player.inventory.push(it);recalcHp();r();}
function sellItem(id){
  let it=G.player.inventory.find(i=>i.id===id);if(!it)return;
  G.player.gold+=it.value;G.player.inventory=G.player.inventory.filter(i=>i.id!==id);r();
}

// ── Canvas click handler ──────────────────
document.addEventListener('click',function(e){
  if(G.inCombat||G.view!=='dungeon') return;
  let c=document.getElementById('dg'); if(!c) return;
  let rect=c.getBoundingClientRect();
  let scaleX=CELL*GRID/rect.width;
  let scaleY=CELL*GRID/rect.height;
  let mx=(e.clientX-rect.left)*scaleX;
  let my=(e.clientY-rect.top)*scaleY;
  let cc=Math.floor(mx/CELL), cr=Math.floor(my/CELL);
  if(cr>=0&&cr<GRID&&cc>=0&&cc<GRID) moveTo(cr,cc);
});

document.addEventListener('keydown',function(e){
  if(G.inCombat||G.view!=='dungeon') return;
  let r=G.playerR,c=G.playerC;
  switch(e.key){case'ArrowUp':case'w':case'W':r--;break;case'ArrowDown':case's':case'S':r++;break;case'ArrowLeft':case'a':case'A':c--;break;case'ArrowRight':case'd':case'D':c++;break;default:return;}
  e.preventDefault();
  let cell=G.grid[r]&&G.grid[r][c];
  if(cell&&cell.revealed&&cell.type!=='wall') moveTo(r,c);
});

// ── Touch swipe ───────────────────────────
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',function(e){if(e.target.tagName!=='CANVAS')return;touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;});
document.addEventListener('touchend',function(e){
  if(G.inCombat||G.view!=='dungeon') return;
  let dx=(e.changedTouches[0]||e.changedTouches[0]).clientX-touchStartX;
  let dy=(e.changedTouches[0]||e.changedTouches[0]).clientY-touchStartY;
  if(Math.abs(dx)+Math.abs(dy)<20) return;
  let r=G.playerR,c=G.playerC;
  if(Math.abs(dx)>Math.abs(dy)) c+=dx>0?1:-1; else r+=dy>0?1:-1;
  let cell=G.grid[r]&&G.grid[r][c];
  if(cell&&cell.revealed&&cell.type!=='wall') moveTo(r,c);
});

// ── Init ──────────────────────────────────
initGame();r();
</script>
</body>
</html>
